name: Refresh data tiles

on:
  schedule:
    # Run annually on Jan 15 (forest data updates are typically yearly)
    - cron: '0 3 15 1 *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to refresh (blank = all)'
        required: false
        type: choice
        options:
          - ''
          - jprl
          - lestypy
          - geo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate data tiles
        run: |
          SOURCE_ARG=""
          if [ -n "${{ inputs.source }}" ]; then
            SOURCE_ARG="--source ${{ inputs.source }}"
          fi
          python3 scripts/generate_tiles.py --resume $SOURCE_ARG

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refresh data tiles $(date +%Y-%m-%d)"
            git push
          fi
