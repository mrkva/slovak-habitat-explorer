<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Interactive map of Slovak forests and geology. Tap to identify habitat types, forest classification, and geological formations.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Habitat SK">
    <meta name="theme-color" content="#1a5c1a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Habitat Explorer SK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; cursor: default; }
        .leaflet-grab { cursor: default !important; }
        .leaflet-dragging .leaflet-grab { cursor: default !important; }

        .leaflet-control-layers { max-height: 80vh; overflow-y: auto; }
        .leaflet-control-layers-expanded { padding: 8px 12px; }
        .leaflet-control-layers label { font-size: 14px; padding: 2px 0; }

        #opacity-panel {
            position: absolute; bottom: 30px; left: 10px; z-index: 1000;
            background: white; border-radius: 8px; padding: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px;
            max-height: 60vh; overflow-y: auto;
        }
        #opacity-toggle {
            padding: 8px 14px; font-weight: 600; cursor: pointer; font-size: 13px;
            user-select: none; display: flex; align-items: center; gap: 6px;
        }
        #opacity-toggle .arrow { font-size: 10px; transition: transform 0.2s; }
        #opacity-toggle .arrow.open { transform: rotate(90deg); }
        #opacity-sliders { display: none; padding: 0 12px 10px; border-top: 1px solid #eee; }
        .opacity-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
        .opacity-row .lbl { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
        .opacity-row input[type="range"] { width: 80px; }
        .opacity-row .pct { width: 30px; text-align: right; font-size: 11px; color: #888; }

        .fi { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; max-width: 280px; line-height: 1.5; }
        .fi .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 4px; padding: 3px 0; }
        .fi .section-forest { color: #1a5c1a; border-bottom: 2px solid #1a5c1a; }
        .fi .section-geology { color: #8b5e3c; border-bottom: 2px solid #8b5e3c; margin-top: 10px; }
        .fi .type-name { font-size: 17px; font-weight: 700; color: #1a5c1a; margin-bottom: 4px; }
        .fi .hslt-name { font-size: 14px; color: #555; margin-bottom: 6px; }
        .fi .category-tag {
            display: inline-block; padding: 2px 10px; border-radius: 4px;
            font-size: 12px; font-weight: 600; color: white; margin-bottom: 4px;
        }
        .fi .cat-H { background: #d97706; }
        .fi .cat-O { background: #059669; }
        .fi .cat-U { background: #7c3aed; }
        .fi .area { font-size: 13px; color: #777; }
        .fi .geo-name { font-size: 15px; font-weight: 600; color: #8b5e3c; margin: 4px 0 2px; }
        .fi .geo-age { font-size: 13px; color: #666; margin-bottom: 6px; }
        .fi .loading { color: #888; font-style: italic; }
        .fi .error { color: #666; }
        .fi .source { font-size: 11px; color: #aaa; margin-top: 4px; }
        .fi .source a { color: #999; text-decoration: none; }
        .fi .source a:hover { text-decoration: underline; color: #666; }

        .save-btn {
            position: absolute; right: 10px; z-index: 1000;
            background: #1a5c1a; color: white; border: none; border-radius: 8px;
            padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .save-btn:active { background: #145214; }
        #save-area { bottom: 30px; }
        #download-all { bottom: 72px; background: #2d6b2d; }
        #download-panel {
            position: absolute; bottom: 114px; right: 10px; z-index: 1000;
            background: white; border-radius: 8px; padding: 10px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: none; min-width: 200px;
        }
        #download-panel .bar-bg {
            background: #e5e7eb; border-radius: 4px; height: 8px; margin: 6px 0; overflow: hidden;
        }
        #download-panel .bar-fill {
            background: #1a5c1a; height: 100%; width: 0%; transition: width 0.3s;
        }
        #download-panel .status { color: #555; }
        #save-progress {
            position: absolute; bottom: 114px; right: 10px; z-index: 1000;
            background: white; border-radius: 8px; padding: 8px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: none;
        }

        #hint {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(0,0,0,0.75); color: white; border-radius: 20px;
            padding: 8px 18px; font-size: 13px; font-weight: 500;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            pointer-events: none; opacity: 1; transition: opacity 0.5s;
        }
        #hint.hidden { opacity: 0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="hint">Tap the map to identify habitats</div>
    <button id="save-area" class="save-btn">Save map tiles</button>
    <button id="download-all" class="save-btn">Download all data</button>
    <div id="download-panel">
        <div class="status" id="download-status">Preparing...</div>
        <div class="bar-bg"><div class="bar-fill" id="download-bar"></div></div>
    </div>
    <div id="save-progress"></div>
    <div id="opacity-panel">
        <div id="opacity-toggle"><span class="arrow">&#9654;</span> Layer opacity</div>
        <div id="opacity-sliders"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        var map = L.map('map').setView([48.7, 19.5], 8);

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://openstreetmap.org">OSM</a>', maxZoom: 19
        }).addTo(map);

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri', maxZoom: 19
        });

        function wms(url, attr, extra) {
            return L.tileLayer.wms(url, Object.assign({
                format: 'image/png', transparent: true, opacity: 0.7, attribution: attr
            }, extra || {}));
        }

        var nlcAttr = '&copy; <a href="https://web.nlcsk.org">NLC</a>';
        var geoAttr = '&copy; <a href="https://www.geology.sk">SG&Uacute;D&Scaron;</a>';

        var layers = [
            { id: 'jprl', name: 'Forest stands', group: 'forest',
              layer: wms("https://gis.nlcsk.org/arcgis/services/MPRV/JPRL_ZBGIS/MapServer/WMSServer", nlcAttr, { layers: '0', version: '1.1.1' }), on: true },
            { id: 'drev', name: 'Tree species', group: 'forest',
              layer: wms("https://gis.nlcsk.org/arcgis/services/Inspire/DrevinoveZlozenie/MapServer/WmsServer", nlcAttr, { layers: '0' }), on: false },
            { id: 'ltyp', name: 'Forest types', group: 'forest',
              layer: wms("https://gis.nlcsk.org/arcgis/services/Inspire/LesneTypy/MapServer/WMSServer", nlcAttr, { layers: '0' }), on: false },
            { id: 'geo',  name: 'Geological map 1:50k', group: 'geology',
              layer: wms("https://ags.geology.sk/arcgis/services/WebServices/GM50/MapServer/WMSServer", geoAttr, { layers: '0', version: '1.1.1' }), on: false }
        ];

        layers.forEach(function(l) { if (l.on) l.layer.addTo(map); });

        var forestOverlays = {}, geoOverlays = {};
        layers.forEach(function(l) {
            if (l.group === 'forest') forestOverlays[l.name] = l.layer;
            else geoOverlays[l.name] = l.layer;
        });

        L.control.layers(
            { "OpenStreetMap": osm, "Satellite": satellite },
            Object.assign({}, forestOverlays, geoOverlays),
            { collapsed: true }
        ).addTo(map);

        setTimeout(function() {
            var container = document.querySelector('.leaflet-control-layers-overlays');
            if (!container) return;
            var labels = container.querySelectorAll('label');
            var forestCount = Object.keys(forestOverlays).length;
            if (labels.length > forestCount) {
                var fh = document.createElement('div');
                fh.innerHTML = '<strong style="font-size:12px;color:#1a5c1a;display:block;padding:4px 0 2px;">FOREST</strong>';
                container.insertBefore(fh, labels[0]);
                var gh = document.createElement('div');
                gh.innerHTML = '<hr style="margin:6px 0;border:none;border-top:2px solid #ccc;">'
                    + '<strong style="font-size:12px;color:#8b5e3c;display:block;padding:2px 0;">GEOLOGY</strong>';
                container.insertBefore(gh, labels[forestCount]);
            }
        }, 100);

        var opacityToggle = document.getElementById('opacity-toggle');
        var opacitySliders = document.getElementById('opacity-sliders');
        var opacityOpen = false;

        opacityToggle.addEventListener('click', function() {
            opacityOpen = !opacityOpen;
            opacitySliders.style.display = opacityOpen ? 'block' : 'none';
            opacityToggle.querySelector('.arrow').classList.toggle('open', opacityOpen);
            if (opacityOpen) buildOpacitySliders();
        });

        function buildOpacitySliders() {
            opacitySliders.innerHTML = '';
            layers.forEach(function(l) {
                if (!map.hasLayer(l.layer)) return;
                var row = document.createElement('div');
                row.className = 'opacity-row';
                var pct = Math.round(l.layer.options.opacity * 100);
                row.innerHTML = '<span class="lbl">' + l.name + '</span>'
                    + '<input type="range" min="0" max="100" value="' + pct + '">'
                    + '<span class="pct">' + pct + '%</span>';
                var slider = row.querySelector('input');
                var pctSpan = row.querySelector('.pct');
                slider.addEventListener('input', function() {
                    l.layer.setOpacity(this.value / 100);
                    pctSpan.textContent = this.value + '%';
                });
                opacitySliders.appendChild(row);
            });
        }

        map.on('overlayadd overlayremove', function() {
            if (opacityOpen) buildOpacitySliders();
        });

        map.locate({ setView: false, maxZoom: 14, enableHighAccuracy: true });
        map.on('locationfound', function(e) {
            L.circleMarker(e.latlng, { radius: 8, color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 2 })
                .addTo(map).bindPopup("You are here").openPopup();
        });

        L.control.scale({ imperial: false }).addTo(map);

        var hint = document.getElementById('hint');
        map.once('click', function() {
            hint.classList.add('hidden');
            setTimeout(function() { hint.remove(); }, 500);
        });

        var identifySources = [
            { key: 'jprl',    group: 'forest', url: 'https://gis.nlcsk.org/arcgis/rest/services/MPRV/JPRL_ZBGIS/MapServer/identify' },
            { key: 'lestypy', group: 'forest', url: 'https://gis.nlcsk.org/arcgis/rest/services/Inspire/LesneTypy/MapServer/identify' },
            { key: 'geo',     group: 'geology', url: 'https://ags.geology.sk/arcgis/rest/services/WebServices/GM50/MapServer/identify', layers: 'all:2', tolerance: '3' }
        ];

        var categoryLabels = {
            'H': { text: 'Commercial', cls: 'cat-H' },
            'O': { text: 'Protective', cls: 'cat-O' },
            'U': { text: 'Special purpose', cls: 'cat-U' }
        };

        function isGroupActive(group) {
            return layers.some(function(l) { return l.group === group && map.hasLayer(l.layer); });
        }

        function identifyUrl(source, latlng) {
            var b = map.getBounds(), s = map.getSize();
            return source.url + '?' + [
                'geometry=' + latlng.lng + ',' + latlng.lat,
                'geometryType=esriGeometryPoint', 'sr=4326',
                'layers=' + (source.layers || 'all'),
                'tolerance=' + (source.tolerance || '10'),
                'mapExtent=' + [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].join(','),
                'imageDisplay=' + s.x + ',' + s.y + ',96',
                'returnGeometry=false', 'f=json'
            ].join('&');
        }

        function fetchJson(url) {
            return fetch(url).then(function(r) {
                if (!r.ok) throw new Error(r.status);
                return r.json();
            }).catch(function() {
                return fetch('https://corsproxy.io/?' + encodeURIComponent(url))
                    .then(function(r) { return r.json(); });
            });
        }

        function findField(attrs, names) {
            for (var i = 0; i < names.length; i++) {
                var v = attrs[names[i]];
                if (v !== undefined && v !== null && v !== '' && v !== 'Null' && v !== '-') return v;
            }
            return null;
        }

        var DATA_TILE_ZOOM = 12;

        function pointInPolygon(point, ring) {
            var x = point[0], y = point[1], inside = false;
            for (var i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                var xi = ring[i][0], yi = ring[i][1];
                var xj = ring[j][0], yj = ring[j][1];
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi))
                    inside = !inside;
            }
            return inside;
        }

        function findFeatureAtPoint(geojson, latlng) {
            if (!geojson || !geojson.features) return null;
            var pt = [latlng.lng, latlng.lat];
            for (var i = 0; i < geojson.features.length; i++) {
                var f = geojson.features[i];
                var coords = f.geometry && f.geometry.coordinates;
                if (!coords || !coords[0]) continue;
                // Check outer ring, exclude holes
                if (pointInPolygon(pt, coords[0])) {
                    var inHole = false;
                    for (var h = 1; h < coords.length; h++) {
                        if (pointInPolygon(pt, coords[h])) { inHole = true; break; }
                    }
                    if (!inHole) return f;
                }
            }
            return null;
        }

        function dataTileUrl(sourceKey, latlng) {
            var tile = latLngToTile(latlng, DATA_TILE_ZOOM);
            return './data/' + sourceKey + '/' + DATA_TILE_ZOOM + '/' + tile.x + '/' + tile.y + '.json';
        }

        // Try data tile first (works offline), fall back to live identify
        function querySource(src, latlng) {
            return fetchJson(dataTileUrl(src.key, latlng)).then(function(geojson) {
                var feature = findFeatureAtPoint(geojson, latlng);
                if (feature) return { results: [{ attributes: feature.properties }] };
                return { results: [] };
            }).catch(function() {
                // Data tile not available, fall back to live identify
                return fetchJson(identifyUrl(src, latlng));
            });
        }

        var identifyCache = {};
        function cacheKey(srcKey, latlng) {
            return srcKey + ':' + (Math.round(latlng.lat * 1000) / 1000) + ',' + (Math.round(latlng.lng * 1000) / 1000);
        }

        function buildPopup(data) {
            var html = '<div class="fi">';
            var hasForest = false, hasGeo = false;

            var forestHtml = '';
            if (data.lestypy && data.lestypy.results && data.lestypy.results.length > 0) {
                var a = data.lestypy.results[0].attributes;
                var hlavny = findField(a, ['Hlavny_lesny_typ', 'Hlavny lesny typ', 'HLAVNY_LESNY_TYP',
                    'Nazov_lesneho_typu_1', 'Nazov lesneho typu 1', 'NAZOV_LESNEHO_TYPU_1',
                    'nazov_lesneho_typu_1', 'Nazov_lesneho_typu', 'NAZOV', 'hlLT', 'NLT1']);
                var hslt = findField(a, ['Nazov_HSLT', 'Nazov HSLT', 'NAZOV_HSLT', 'nazov_hslt', 'HSLT', 'NHSLT']);
                if (hlavny) { forestHtml += '<div class="type-name">' + hlavny + '</div>'; hasForest = true; }
                if (hslt) { forestHtml += '<div class="hslt-name">' + hslt + '</div>'; hasForest = true; }
            }
            if (data.jprl && data.jprl.results && data.jprl.results.length > 0) {
                var aj = data.jprl.results[0].attributes;
                var kl = findField(aj, ['KL', 'kl']);
                var cat = kl ? categoryLabels[kl] : null;
                if (cat) { forestHtml += '<div><span class="category-tag ' + cat.cls + '">' + cat.text + '</span></div>'; hasForest = true; }
                var area = findField(aj, ['Plocha', 'PLOCHA', 'plocha']);
                if (area) forestHtml += '<div class="area">' + (parseFloat(area) / 10000).toFixed(2) + ' ha</div>';
            }
            if (hasForest) {
                html += '<div class="section-label section-forest">FOREST</div>' + forestHtml;
                html += '<div class="source">Source: <a href="https://web.nlcsk.org" target="_blank">N\u00e1rodn\u00e9 lesn\u00edcke centrum</a></div>';
            }

            if (data.geo && data.geo.results && data.geo.results.length > 0) {
                var geoHtml = '';
                var seen = {};
                data.geo.results.forEach(function(r) {
                    var a = r.attributes;
                    var popis = a['Popis'] || a['popis'] || a['POPIS'] || '';
                    if (!popis || popis === '-') return;
                    if (seen[popis]) return;
                    seen[popis] = true;
                    var utvar = a['\u00datvar'] || a['Utvar'] || a['utv'] || '';
                    var vek1 = a['Vek1'] || a['vek1'] || '';
                    var suvrstvie = a['S\u00favrstvie'] || a['Suvrstvie'] || a['ksuvrstvie'] || '';
                    geoHtml += '<div class="geo-name">' + popis + '</div>';
                    var details = [];
                    if (utvar && utvar !== '-') details.push(utvar);
                    if (vek1 && vek1 !== '-') details.push(vek1);
                    if (suvrstvie && suvrstvie !== '-') details.push(suvrstvie);
                    if (details.length > 0) geoHtml += '<div class="geo-age">' + details.join(' \u00b7 ') + '</div>';
                    hasGeo = true;
                });
                if (hasGeo) {
                    html += '<div class="section-label section-geology">GEOLOGY</div>' + geoHtml;
                    html += '<div class="source">Source: <a href="https://www.geology.sk" target="_blank">SG\u00daD\u0160</a></div>';
                }
            }

            if (!hasForest && !hasGeo) {
                html += '<p class="error">No data here.<br>Zoom in and tap a colored area.</p>';
            }
            html += '</div>';
            return html;
        }

        map.on('click', function(e) {
            var forestActive = isGroupActive('forest');
            var geoActive = isGroupActive('geology');
            if (!forestActive && !geoActive) return;

            var popup = L.popup({ maxWidth: 300, maxHeight: 400 })
                .setLatLng(e.latlng)
                .setContent('<div class="fi"><p class="loading">Loading...</p></div>')
                .openOn(map);

            var activeSources = identifySources.filter(function(src) {
                if (src.group === 'forest') return forestActive;
                if (src.group === 'geology') return geoActive;
                return true;
            });

            var data = {}, done = 0, total = activeSources.length;

            activeSources.forEach(function(src) {
                var ck = cacheKey(src.key, e.latlng);
                if (identifyCache[ck]) {
                    data[src.key] = identifyCache[ck];
                    if (++done === total) popup.setContent(buildPopup(data));
                    return;
                }
                querySource(src, e.latlng)
                    .then(function(j) {
                        data[src.key] = j;
                        identifyCache[ck] = j;
                    })
                    .catch(function() { data[src.key] = null; })
                    .finally(function() {
                        if (++done === total) popup.setContent(buildPopup(data));
                    });
            });
        });

        document.getElementById('save-area').addEventListener('click', function() {
            var b = map.getBounds();
            var zoom = map.getZoom();
            var minZ = Math.max(zoom - 1, 1);
            var maxZ = Math.min(zoom + 3, 16);
            var progress = document.getElementById('save-progress');
            progress.style.display = 'block';

            var urls = [];
            for (var z = minZ; z <= maxZ; z++) {
                var min = latLngToTile(b.getSouthWest(), z);
                var max = latLngToTile(b.getNorthEast(), z);
                for (var x = min.x; x <= max.x; x++) {
                    for (var y = max.y; y <= min.y; y++) {
                        var sub = ['a','b','c'][(x + y) % 3];
                        urls.push('https://' + sub + '.tile.openstreetmap.org/' + z + '/' + x + '/' + y + '.png');
                    }
                }
            }

            // Collect data tile URLs for visible area
            var forestActive = isGroupActive('forest');
            var geoActive = isGroupActive('geology');
            var dataTileUrls = [];
            // Find all z12 data tiles that cover the visible area
            var tMin = latLngToTile(b.getSouthWest(), DATA_TILE_ZOOM);
            var tMax = latLngToTile(b.getNorthEast(), DATA_TILE_ZOOM);
            for (var tx = tMin.x; tx <= tMax.x; tx++) {
                for (var ty = tMax.y; ty <= tMin.y; ty++) {
                    identifySources.forEach(function(src) {
                        if (src.group === 'forest' && !forestActive) return;
                        if (src.group === 'geology' && !geoActive) return;
                        dataTileUrls.push('./data/' + src.key + '/' + DATA_TILE_ZOOM + '/' + tx + '/' + ty + '.json');
                    });
                }
            }

            var total = urls.length + dataTileUrls.length;
            var loaded = 0;
            progress.textContent = 'Caching 0/' + total + '...';

            function tick() {
                loaded++;
                progress.textContent = 'Caching ' + loaded + '/' + total + '...';
            }

            caches.open('habitat-tiles-v1').then(function(tileCache) {
                var queue = urls.slice();
                function nextTile() {
                    if (queue.length === 0) return cacheData();
                    var chunk = queue.splice(0, 6);
                    return Promise.all(chunk.map(function(u) {
                        return tileCache.add(u).catch(function() {}).then(tick);
                    })).then(nextTile);
                }
                function cacheData() {
                    progress.textContent = loaded + '/' + total + ' \u2014 caching data tiles...';
                    var dq = dataTileUrls.slice();
                    function nextData() {
                        if (dq.length === 0) {
                            progress.textContent = 'Done! ' + total + ' items saved.';
                            setTimeout(function() { progress.style.display = 'none'; }, 2500);
                            return;
                        }
                        var chunk = dq.splice(0, 4);
                        return Promise.all(chunk.map(function(u) {
                            return caches.open('habitat-data-v1').then(function(cache) {
                                return fetch(u).then(function(r) {
                                    if (r.ok) return cache.put(u, r);
                                }).catch(function() {});
                            }).then(tick);
                        })).then(nextData);
                    }
                    return nextData();
                }
                return nextTile();
            });
        });

        // Request persistent storage so browser won't evict cached data
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist();
        }

        document.getElementById('download-all').addEventListener('click', function() {
            var panel = document.getElementById('download-panel');
            var status = document.getElementById('download-status');
            var bar = document.getElementById('download-bar');
            panel.style.display = 'block';

            // Calculate all z12 tiles covering Slovakia
            var SK = { south: 47.73, north: 49.61, west: 16.83, east: 22.57 };
            var sw = L.latLng(SK.south, SK.west);
            var ne = L.latLng(SK.north, SK.east);
            var tMin = latLngToTile(sw, DATA_TILE_ZOOM);
            var tMax = latLngToTile(ne, DATA_TILE_ZOOM);

            var sources = ['jprl', 'lestypy', 'geo'];
            var allUrls = [];
            for (var tx = tMin.x; tx <= tMax.x; tx++) {
                for (var ty = tMax.y; ty <= tMin.y; ty++) {
                    sources.forEach(function(s) {
                        allUrls.push('./data/' + s + '/' + DATA_TILE_ZOOM + '/' + tx + '/' + ty + '.json');
                    });
                }
            }

            var total = allUrls.length;
            var loaded = 0;
            var failed = 0;
            status.textContent = '0 / ' + total;
            bar.style.width = '0%';

            caches.open('habitat-data-v1').then(function(cache) {
                var queue = allUrls.slice();
                function next() {
                    if (queue.length === 0) {
                        var msg = 'Done! ' + loaded + ' tiles cached.';
                        if (failed > 0) msg += ' (' + failed + ' not yet available)';
                        status.textContent = msg;
                        bar.style.width = '100%';
                        setTimeout(function() { panel.style.display = 'none'; }, 4000);
                        return;
                    }
                    var chunk = queue.splice(0, 8);
                    return Promise.all(chunk.map(function(u) {
                        return cache.match(u).then(function(cached) {
                            if (cached) { loaded++; return; }
                            return fetch(u).then(function(r) {
                                if (r.ok) { cache.put(u, r); loaded++; }
                                else failed++;
                            }).catch(function() { failed++; });
                        });
                    })).then(function() {
                        var done = loaded + failed;
                        var pct = Math.round(done / total * 100);
                        bar.style.width = pct + '%';
                        status.textContent = done + ' / ' + total + ' (' + Math.round(loaded / 1024 * 100) / 100 + ' k cached)';
                        return next();
                    });
                }
                return next();
            });
        });

        function latLngToTile(latlng, zoom) {
            var lat = latlng.lat * Math.PI / 180;
            var n = Math.pow(2, zoom);
            return {
                x: Math.floor((latlng.lng + 180) / 360 * n),
                y: Math.floor((1 - Math.log(Math.tan(lat) + 1 / Math.cos(lat)) / Math.PI) / 2 * n)
            };
        }
    </script>
</body>
</html>
