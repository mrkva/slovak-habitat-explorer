<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Forest SK">
    <meta name="theme-color" content="#1a5c1a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Forest Explorer SK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }

        .leaflet-control-layers { max-height: 80vh; overflow-y: auto; }
        .leaflet-control-layers-expanded { padding: 8px 12px; }
        .leaflet-control-layers label { font-size: 14px; padding: 2px 0; }

        #opacity-control {
            position: absolute; bottom: 30px; left: 10px; z-index: 1000;
            background: white; border-radius: 8px; padding: 10px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px;
        }
        #opacity-control label { display: block; margin-bottom: 4px; font-weight: 600; }
        #opacity-control input[type="range"] { width: 140px; }

        /* Popup */
        .fi { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; max-width: 280px; line-height: 1.5; }
        .fi .type-name { font-size: 17px; font-weight: 700; color: #1a5c1a; margin-bottom: 4px; }
        .fi .hslt-name { font-size: 14px; color: #555; margin-bottom: 6px; }
        .fi .category-tag {
            display: inline-block; padding: 2px 10px; border-radius: 4px;
            font-size: 12px; font-weight: 600; color: white; margin-bottom: 8px;
        }
        .fi .cat-H { background: #d97706; }
        .fi .cat-O { background: #059669; }
        .fi .cat-U { background: #7c3aed; }
        .fi .area { font-size: 13px; color: #777; }
        .fi .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #999; letter-spacing: 0.5px; margin: 8px 0 3px; }
        .fi .geo-name { font-size: 15px; font-weight: 600; color: #8b5e3c; }
        .fi .geo-detail { font-size: 13px; color: #666; margin-bottom: 2px; }
        .fi .divider { border: none; border-top: 1px solid #eee; margin: 8px 0; }
        .fi .loading { color: #888; font-style: italic; }
        .fi .error { color: #666; }

        /* Offline save button */
        #save-area {
            position: absolute; top: 80px; right: 10px; z-index: 1000;
            background: #1a5c1a; color: white; border: none; border-radius: 8px;
            padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #save-area:active { background: #145214; }
        #save-progress {
            position: absolute; top: 118px; right: 10px; z-index: 1000;
            background: white; border-radius: 8px; padding: 8px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="save-area">Save area offline</button>
    <div id="save-progress"></div>
    <div id="opacity-control">
        <label>Overlay opacity: <span id="opacity-value">70%</span></label>
        <input type="range" id="opacity-slider" min="0" max="100" value="70">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- Register service worker for offline ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        var map = L.map('map').setView([48.7, 19.5], 8);

        // Base layers
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://openstreetmap.org">OSM</a>',
            maxZoom: 19
        }).addTo(map);

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri', maxZoom: 19
        });

        // WMS helper
        function wms(url, attr, extra) {
            return L.tileLayer.wms(url, Object.assign({
                format: 'image/png', transparent: true, opacity: 0.7, attribution: attr
            }, extra || {}));
        }

        var nlcAttr = '&copy; <a href="https://web.nlcsk.org">NLC</a>';
        var geoAttr = '&copy; <a href="https://www.geology.sk">SGÚDŠ</a>';

        // Forest overlays (NLC)
        var jprl = wms("https://gis.nlcsk.org/arcgis/services/MPRV/JPRL_ZBGIS/MapServer/WMSServer",
            nlcAttr, { layers: '0', version: '1.1.1' }).addTo(map);
        var drevinoveZlozenie = wms("https://gis.nlcsk.org/arcgis/services/Inspire/DrevinoveZlozenie/MapServer/WmsServer", nlcAttr, { layers: '0' });
        var lesneTypy = wms("https://gis.nlcsk.org/arcgis/services/Inspire/LesneTypy/MapServer/WMSServer", nlcAttr, { layers: '0' });
        var lesneCesty = wms("https://gis.nlcsk.org/arcgis/services/Inspire/LesneCesty/MapServer/WMSServer", nlcAttr, { layers: '0' });
        var lhc = wms("https://gis.nlcsk.org/arcgis/services/Inspire/LHC/MapServer/WMSServer", nlcAttr, { layers: '0' });
        var lesneOblasti = wms("https://gis.nlcsk.org/arcgis/services/Inspire/LesneOblasti/MapServer/WMSServer", nlcAttr, { layers: '0' });

        // Geology overlays (SGÚDŠ)
        var geoMap = wms("https://ags.geology.sk/arcgis/services/WebServices/GM50/MapServer/WMSServer",
            geoAttr, { layers: '0', version: '1.1.1' });
        var geoIGR = wms("https://ags.geology.sk/arcgis/services/WebServices/IGR50/MapServer/WMSServer",
            geoAttr, { layers: '0', version: '1.1.1' });
        var geoDeposits = wms("https://ags.geology.sk/arcgis/services/WebServices/LOZISKA/MapServer/WMSServer",
            geoAttr, { layers: '0', version: '1.1.1' });

        var allWmsLayers = [jprl, drevinoveZlozenie, lesneTypy, lesneCesty, lhc, lesneOblasti,
                            geoMap, geoIGR, geoDeposits];

        L.control.layers(
            { "OpenStreetMap": osm, "Satellite": satellite },
            {
                "Forest stands (JPRL)": jprl, "Tree species": drevinoveZlozenie, "Forest types": lesneTypy,
                "Forest roads": lesneCesty, "Management units": lhc, "Forest regions": lesneOblasti,
                "Geological map 1:50k": geoMap,
                "Engineering-geo map 1:50k": geoIGR,
                "Mineral deposits": geoDeposits
            },
            { collapsed: true }
        ).addTo(map);

        // Geolocation
        map.locate({ setView: false, maxZoom: 14, enableHighAccuracy: true });
        map.on('locationfound', function(e) {
            L.circleMarker(e.latlng, { radius: 8, color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 2 })
                .addTo(map).bindPopup("You are here").openPopup();
        });

        // Opacity
        document.getElementById('opacity-slider').addEventListener('input', function() {
            var v = this.value / 100;
            document.getElementById('opacity-value').textContent = this.value + '%';
            allWmsLayers.forEach(function(l) { l.setOpacity(v); });
        });

        L.control.scale({ imperial: false }).addTo(map);

        // =============================================
        // Click-to-identify
        // =============================================
        var identifySources = [
            { key: 'jprl',    url: 'https://gis.nlcsk.org/arcgis/rest/services/MPRV/JPRL_ZBGIS/MapServer/identify' },
            { key: 'lestypy', url: 'https://gis.nlcsk.org/arcgis/rest/services/Inspire/LesneTypy/MapServer/identify' },
            { key: 'geo',     url: 'https://ags.geology.sk/arcgis/rest/services/WebServices/GM50/MapServer/identify' }
        ];

        var categoryLabels = {
            'H': { text: 'Commercial', cls: 'cat-H' },
            'O': { text: 'Protective', cls: 'cat-O' },
            'U': { text: 'Special purpose', cls: 'cat-U' }
        };

        function identifyUrl(source, latlng) {
            var b = map.getBounds(), s = map.getSize();
            return source.url + '?' + [
                'geometry=' + latlng.lng + ',' + latlng.lat,
                'geometryType=esriGeometryPoint', 'sr=4326', 'layers=all', 'tolerance=10',
                'mapExtent=' + [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].join(','),
                'imageDisplay=' + s.x + ',' + s.y + ',96',
                'returnGeometry=false', 'f=json'
            ].join('&');
        }

        function fetchJson(url) {
            return fetch(url).then(function(r) {
                if (!r.ok) throw new Error(r.status);
                return r.json();
            }).catch(function() {
                return fetch('https://corsproxy.io/?' + encodeURIComponent(url))
                    .then(function(r) { return r.json(); });
            });
        }

        // Find a field value trying multiple possible field names
        function findField(attrs, names) {
            for (var i = 0; i < names.length; i++) {
                var v = attrs[names[i]];
                if (v !== undefined && v !== null && v !== '' && v !== 'Null') return v;
            }
            return null;
        }

        function buildPopup(data) {
            var html = '<div class="fi">';
            var hasType = false, hasCat = false;

            // Forest type from LesneTypy
            if (data.lestypy && data.lestypy.results && data.lestypy.results.length > 0) {
                var a = data.lestypy.results[0].attributes;
                // Use the exact field names from the real response
                var hlavny = findField(a, ['Hlavny_lesny_typ', 'Hlavny lesny typ', 'HLAVNY_LESNY_TYP',
                    'Nazov_lesneho_typu_1', 'Nazov lesneho typu 1', 'NAZOV_LESNEHO_TYPU_1',
                    'nazov_lesneho_typu_1', 'Nazov_lesneho_typu', 'NAZOV']);
                var hslt = findField(a, ['Nazov_HSLT', 'Nazov HSLT', 'NAZOV_HSLT', 'nazov_hslt', 'HSLT']);

                if (hlavny) {
                    html += '<div class="type-name">' + hlavny + '</div>';
                    hasType = true;
                }
                if (hslt) {
                    html += '<div class="hslt-name">' + hslt + '</div>';
                    hasType = true;
                }
            }

            // Category + area from JPRL
            if (data.jprl && data.jprl.results && data.jprl.results.length > 0) {
                var aj = data.jprl.results[0].attributes;
                var kl = findField(aj, ['KL', 'kl']);
                var cat = kl ? categoryLabels[kl] : null;
                if (cat) {
                    html += '<div><span class="category-tag ' + cat.cls + '">' + cat.text + '</span></div>';
                    hasCat = true;
                }
                var area = findField(aj, ['Plocha', 'PLOCHA', 'plocha']);
                if (area) {
                    var ha = (parseFloat(area) / 10000).toFixed(2);
                    html += '<div class="area">' + ha + ' ha</div>';
                }
            }

            // --- Geology from GM50 ---
            var hasGeo = false;
            if (data.geo && data.geo.results && data.geo.results.length > 0) {
                hasGeo = true;
                if (hasType || hasCat) html += '<hr class="divider">';
                html += '<div class="section-label">Geology</div>';
                data.geo.results.forEach(function(r, i) {
                    var a = r.attributes;
                    if (i > 0) html += '<hr class="divider">';
                    // Try common field names for rock/formation name
                    var name = findField(a, ['NAZOV','Nazov','nazov','NAME','Name','POPIS','Popis',
                        'HORNINA','Hornina','LITOLOGIA','Litologia','ROCK_TYPE','Rock_Type',
                        'FORMATION','Formation','FORMACIA','Formacia','LABEL','Label']);
                    var age = findField(a, ['VEK','Vek','vek','AGE','Age','STRATIG','Stratig',
                        'OBDOBIE','Obdobie','PERIOD','Period','ERA','Era','EPOCH','Epoch']);
                    var litho = findField(a, ['LITOTYP','Litotyp','LITOLOGIA','Litologia',
                        'ROCK','Rock','HORNINY','Horniny','DESCRIPTION','Description',
                        'POPIS_ENG','POPIS_SK','Popis_SK']);
                    var layerName = r.layerName || '';

                    if (name) {
                        html += '<div class="geo-name">' + name + '</div>';
                    } else if (layerName) {
                        html += '<div class="geo-name">' + layerName + '</div>';
                    }
                    if (age) html += '<div class="geo-detail">Age: ' + age + '</div>';
                    if (litho && litho !== name) html += '<div class="geo-detail">' + litho + '</div>';

                    // Show remaining non-trivial fields
                    var shown = ['NAZOV','Nazov','nazov','NAME','Name','POPIS','Popis',
                        'HORNINA','Hornina','LITOLOGIA','Litologia','ROCK_TYPE','Rock_Type',
                        'FORMATION','Formation','FORMACIA','Formacia','LABEL','Label',
                        'VEK','Vek','vek','AGE','Age','STRATIG','Stratig',
                        'OBDOBIE','Obdobie','PERIOD','Period','ERA','Era','EPOCH','Epoch',
                        'LITOTYP','Litotyp','ROCK','Rock','HORNINY','Horniny',
                        'DESCRIPTION','Description','POPIS_ENG','POPIS_SK','Popis_SK',
                        'OBJECTID','FID','Shape','SHAPE','Shape_Length','Shape_Area',
                        'SHAPE_Length','SHAPE_Area','SHAPE.AREA','SHAPE.LEN'];
                    Object.keys(a).forEach(function(k) {
                        if (shown.indexOf(k) !== -1) return;
                        var v = a[k];
                        if (v === null || v === '' || v === 'Null') return;
                        html += '<div class="geo-detail"><b>' + k + ':</b> ' + v + '</div>';
                    });
                });
            }

            if (!hasType && !hasCat && !hasGeo) {
                html += '<p class="error">No data here.<br>Zoom in and tap a forest or geological area.</p>';
            }

            html += '</div>';
            return html;
        }

        map.on('click', function(e) {
            var popup = L.popup({ maxWidth: 300, maxHeight: 350 })
                .setLatLng(e.latlng)
                .setContent('<div class="fi"><p class="loading">Loading...</p></div>')
                .openOn(map);

            var data = {}, done = 0;
            identifySources.forEach(function(src) {
                fetchJson(identifyUrl(src, e.latlng))
                    .then(function(j) { data[src.key] = j; })
                    .catch(function() { data[src.key] = null; })
                    .finally(function() {
                        if (++done === identifySources.length)
                            popup.setContent(buildPopup(data));
                    });
            });
        });

        // =============================================
        // Save area offline
        // =============================================
        document.getElementById('save-area').addEventListener('click', function() {
            var b = map.getBounds();
            var zoom = map.getZoom();
            var minZ = Math.max(zoom - 1, 1);
            var maxZ = Math.min(zoom + 3, 16);
            var progress = document.getElementById('save-progress');
            progress.style.display = 'block';

            // Collect all tile URLs for current view + a few zoom levels
            var urls = [];
            for (var z = minZ; z <= maxZ; z++) {
                var min = latLngToTile(b.getSouthWest(), z);
                var max = latLngToTile(b.getNorthEast(), z);
                for (var x = min.x; x <= max.x; x++) {
                    for (var y = max.y; y <= min.y; y++) {
                        var sub = ['a','b','c'][(x + y) % 3];
                        urls.push('https://' + sub + '.tile.openstreetmap.org/' + z + '/' + x + '/' + y + '.png');
                    }
                }
            }

            // Also pre-query forest data on a grid across the visible area
            var gridStep = 0.005; // ~500m grid
            var identifyUrls = [];
            for (var lat = b.getSouth(); lat <= b.getNorth(); lat += gridStep) {
                for (var lng = b.getWest(); lng <= b.getEast(); lng += gridStep) {
                    var ll = L.latLng(lat, lng);
                    identifySources.forEach(function(src) {
                        identifyUrls.push(identifyUrl(src, ll));
                    });
                }
            }

            var total = urls.length + identifyUrls.length;
            var loaded = 0;
            progress.textContent = 'Caching 0/' + total + ' (tiles + forest data)...';

            if (total > 10000) {
                progress.textContent = 'Area too large (' + total + ' items). Zoom in more.';
                setTimeout(function() { progress.style.display = 'none'; }, 3000);
                return;
            }

            function updateProgress() {
                loaded++;
                progress.textContent = 'Caching ' + loaded + '/' + total + '...';
            }

            // Cache tiles then forest data
            caches.open('forest-tiles-v1').then(function(tileCache) {
                var queue = urls.slice();
                var batch = 6;

                function nextTile() {
                    if (queue.length === 0) return cacheForestData();
                    var chunk = queue.splice(0, batch);
                    return Promise.all(chunk.map(function(u) {
                        return tileCache.add(u).catch(function() {}).then(updateProgress);
                    })).then(nextTile);
                }

                function cacheForestData() {
                    progress.textContent = loaded + '/' + total + ' — caching forest data...';
                    var dq = identifyUrls.slice();

                    function nextData() {
                        if (dq.length === 0) {
                            progress.textContent = 'Done! ' + total + ' items saved for offline.';
                            setTimeout(function() { progress.style.display = 'none'; }, 2500);
                            return;
                        }
                        var chunk = dq.splice(0, 4);
                        return Promise.all(chunk.map(function(u) {
                            return fetchJson(u).catch(function() {}).then(updateProgress);
                        })).then(nextData);
                    }
                    return nextData();
                }

                return nextTile();
            });
        });

        function latLngToTile(latlng, zoom) {
            var lat = latlng.lat * Math.PI / 180;
            var n = Math.pow(2, zoom);
            return {
                x: Math.floor((latlng.lng + 180) / 360 * n),
                y: Math.floor((1 - Math.log(Math.tan(lat) + 1 / Math.cos(lat)) / Math.PI) / 2 * n)
            };
        }
    </script>
</body>
</html>
